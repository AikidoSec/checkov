apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kustomizegoat
  name: kustomizegoat
  namespace: kustomizegoat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kustomizegoat
  template:
    metadata:
      labels:
        app: kustomizegoat
    spec:
      containers:
      - image: nginx:1.19
        name: kustomizegoat
